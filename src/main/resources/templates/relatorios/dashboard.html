<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"></head>
<body>
<nav th:replace="~{layout/base :: nav}"></nav>
<div class="container">
    <h1 class="mb-4">Relatorio do Sistema</h1>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card card-dashboard text-center p-3">
                <h5>Cursos</h5>
                <strong class="display-6" th:text="${totalCursos}">0</strong>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-dashboard text-center p-3">
                <h5>Alunos</h5>
                <strong class="display-6" th:text="${totalAlunos}">0</strong>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-dashboard text-center p-3">
                <h5>Atividades</h5>
                <strong class="display-6" th:text="${totalAtividades}">0</strong>
            </div>
        </div>
    </div>

    <div class="card card-dashboard p-4 bg-white">
        <h4>Atividades por Status</h4>
        <canvas id="graficoStatus" height="120"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:inline="javascript">
    const dadosStatus = [[${dadosStatus}]];
    const labels = Object.keys(dadosStatus);
    const valores = Object.values(dadosStatus);

    new Chart(document.getElementById('graficoStatus'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Quantidade de atividades',
                data: valores
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        precision: 0
                    }
                }
            }
        }
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
