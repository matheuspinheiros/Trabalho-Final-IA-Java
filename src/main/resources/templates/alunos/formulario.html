<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"></head>
<body>
<nav th:replace="~{layout/base :: nav}"></nav>
<div class="container">
    <h1 th:text="${aluno.id == null ? 'Novo Aluno' : 'Editar Aluno'}"></h1>

    <form th:action="@{/alunos/salvar}" th:object="${aluno}" method="post" class="card card-body bg-white">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Nome</label>
            <input class="form-control" th:field="*{nome}" placeholder="Nome completo">
            <div class="text-danger" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" th:field="*{email}" placeholder="aluno@email.com">
            <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Curso</label>
            <select class="form-select" th:field="*{curso}">
                <option value="">Selecione</option>
                <option th:each="curso : ${cursos}" th:value="${curso.id}" th:text="${curso.nome}"></option>
            </select>
            <div class="text-danger" th:if="${#fields.hasErrors('curso')}" th:errors="*{curso}"></div>
        </div>

        <div>
            <button type="submit" class="btn btn-success">Salvar</button>
            <a class="btn btn-secondary" th:href="@{/alunos}">Voltar</a>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
