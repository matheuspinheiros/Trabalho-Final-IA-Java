<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"></head>
<body>
<nav th:replace="~{layout/base :: nav}"></nav>
<div class="container">
    <h1 th:text="${atividade.id == null ? 'Nova Atividade' : 'Editar Atividade'}"></h1>

    <form th:action="@{/atividades/salvar}" th:object="${atividade}" method="post" class="card card-body bg-white">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Titulo</label>
            <input class="form-control" th:field="*{titulo}" placeholder="Ex: Trabalho de Java">
            <div class="text-danger" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Descricao</label>
            <textarea class="form-control" th:field="*{descricao}" rows="3"></textarea>
            <div class="text-danger" th:if="${#fields.hasErrors('descricao')}" th:errors="*{descricao}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Data de entrega</label>
            <input type="date" class="form-control" th:field="*{dataEntrega}">
            <div class="text-danger" th:if="${#fields.hasErrors('dataEntrega')}" th:errors="*{dataEntrega}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Status</label>
            <select class="form-select" th:field="*{status}">
                <option th:each="status : ${statusOptions}" th:value="${status}" th:text="${status}"></option>
            </select>
            <div class="text-danger" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Aluno</label>
            <select class="form-select" th:field="*{aluno}">
                <option value="">Selecione</option>
                <option th:each="aluno : ${alunos}" th:value="${aluno.id}" th:text="${aluno.nome}"></option>
            </select>
            <div class="text-danger" th:if="${#fields.hasErrors('aluno')}" th:errors="*{aluno}"></div>
        </div>

        <div>
            <button type="submit" class="btn btn-success">Salvar</button>
            <a class="btn btn-secondary" th:href="@{/atividades}">Voltar</a>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
