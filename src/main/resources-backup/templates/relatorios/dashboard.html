<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"></head>
<body>
<nav th:replace="~{layout/base :: nav}"></nav>
<div class="main-content">
    <h1>Bem-vindo ao Sistema Acadêmico</h1>

    <p class="text-muted mb-4">
        Gerencie cursos, alunos e atividades em um único ambiente.
    </p>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card card-dashboard text-center p-3">
                <h5>Cursos</h5>
                <strong class="display-6" th:text="${totalCursos}">0</strong>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-dashboard text-center p-3">
                <h5>Alunos</h5>
                <strong class="display-6" th:text="${totalAlunos}">0</strong>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-dashboard text-center p-3">
                <h5>Atividades</h5>
                <strong class="display-6" th:text="${totalAtividades}">0</strong>
            </div>
        </div>
    </div>

    <div class="card card-dashboard p-4 bg-white mb-4 border-0">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0">Resumo com IA</h4>
            <span class="badge text-bg-success">Mistral</span>
        </div>
        <p class="mb-0 lh-lg text-secondary" th:text="${resumoIA}">
            O resumo gerado pela IA aparecera aqui.
        </p>
    </div>

    <div class="card card-dashboard p-4 bg-white">
        <h4>Atividades por Status</h4>
        <canvas id="graficoStatus" height="120"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:inline="javascript">
    const dadosStatus = [[${dadosStatus}]];
    const labels = Object.keys(dadosStatus);
    const valores = Object.values(dadosStatus);

    new Chart(document.getElementById('graficoStatus'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Quantidade de atividades',
                data: valores
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        precision: 0
                    }
                }
            }
        }
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
